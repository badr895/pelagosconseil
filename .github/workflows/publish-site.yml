name: Publish static site files

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Unzip website files
        run: |
          if [ ! -f pelagos-site-ready-to-deploy.zip ]; then
            echo "No deployment zip found. Nothing to do."
            exit 0
          fi
          unzip -o pelagos-site-ready-to-deploy.zip -d .
          rm pelagos-site-ready-to-deploy.zip

      - name: Commit published files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Publish Pelagos static site files"
          git push
